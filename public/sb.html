<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soundboard</title>
<link rel="stylesheet" href__="./assets/curser/curser.css">
<script>
(function() {
  // ─── Inject Styles ───────────────────────────────────────────────
  var style = document.createElement('style');
  style.textContent = `
    #bubble-nav {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999999;
      display: flex;
      gap: 8px;
      padding: 8px 16px;
      background: linear-gradient(135deg, #1a1a1a 0%, #2d0000 50%, #1a1a1a 100%);
      border: 2px solid #cc0000;
      border-radius: 50px;
      box-shadow: 0 4px 24px rgba(200,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.05);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      backdrop-filter: blur(12px);
      white-space: nowrap;
    }
    .bnav-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      color: #fff;
      border-radius: 50px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: background 0.18s ease, box-shadow 0.18s ease, transform 0.12s ease;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.08);
      white-space: nowrap;
    }
    .bnav-btn.home {
      background: #cc0000;
      border-color: #cc0000;
    }
    .bnav-btn:hover {
      background: #cc0000 !important;
      border-color: #cc0000 !important;
      box-shadow: 0 0 14px rgba(204,0,0,0.6);
      transform: scale(1.06);
    }
    .bnav-btn:active {
      transform: scale(0.96);
    }
    @media (max-width: 720px) {
      #bubble-nav {
        left: 8px !important;
        right: 8px !important;
        transform: none !important;
        overflow-x: auto;
        scrollbar-width: none;
      }
      #bubble-nav::-webkit-scrollbar { display: none; }
    }
  `;
  document.head.appendChild(style);

  // ─── Build Nav ───────────────────────────────────────────────────
  var nav = document.createElement('div');
  nav.id = 'bubble-nav';

  var links = [
    {
      label: 'Home',
      href: '/index.html',
      home: true,
      icon: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>'
    },
    { label: 'Games',       href: '/g.html'      },
    { label: 'Movies',      href: '/movies.html'  },
    { label: 'Proxy',       href: '/proxy.html'   },
    { label: 'AI',          href: '/ai.html'      },
    { label: 'Sound Board', href: './sb.html'     },
  ];

  links.forEach(function(item) {
    var a = document.createElement('a');
    a.className = 'bnav-btn' + (item.home ? ' home' : '');
    if (item.icon) a.innerHTML = item.icon + item.label;
    else a.textContent = item.label;

    a.addEventListener('click', function(e) {
      e.preventDefault();
      // All nav buttons are same-origin — mark as internal so no popup
      goingInternal = true;
      window.location.href = item.href;
    });

    nav.appendChild(a);
  });

  function mount() {
    document.body.insertBefore(nav, document.body.firstChild);
  }
  if (document.body) {
    mount();
  } else {
    document.addEventListener('DOMContentLoaded', mount);
  }

  // ─── Leave-page Guard ────────────────────────────────────────────
  var goingInternal = false;

  // Any click on a same-origin <a> tag → mark internal
  document.addEventListener('click', function(e) {
    var anchor = e.target.closest('a');
    if (!anchor || !anchor.href) return;
    try {
      var url = new URL(anchor.href, window.location.href);
      if (url.origin === window.location.origin) {
        goingInternal = true;
      } else {
        // External link — confirm before allowing
        if (!confirm('Are you sure you want to leave this page?')) {
          e.preventDefault();
        }
      }
    } catch(err) {}
  }, true);

  window.addEventListener('beforeunload', function(e) {
    if (goingInternal) {
      goingInternal = false;
      return; // Same domain — no popup
    }
    e.preventDefault();
    e.returnValue = '';
  });

})();
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #060606;
  font-family: 'Inter', Arial, sans-serif;
  color: white;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Ambient background glow */
body::before {
  content: '';
  position: fixed;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at 50% 50%, rgba(180,0,0,0.08) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
  animation: ambientPulse 8s ease-in-out infinite;
}

@keyframes ambientPulse {
  0%, 100% { opacity: 0.5; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.05); }
}

/* ================= UI ================= */

.top-ui {
  position: relative;
  z-index: 1;
  padding: 280px 20px 20px; /* KEEP EXACT to preserve layout */
  display: flex;
  justify-content: center;
}

.panel {
  width: 1100px;
  max-width: 95%;
  padding: 35px;
  border-radius: 25px;
  background: rgba(120,0,0,0.12);
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);
  border: 1px solid rgba(255,0,0,0.25);
  box-shadow:
    0 0 60px rgba(255,0,0,0.12),
    inset 0 1px 0 rgba(255,255,255,0.05);

  display: grid;
  grid-template-columns: 1fr 2fr 1fr;
  align-items: center;
  gap: 20px;
}

.center {
  display: flex;
  flex-direction: column;
  gap: 15px;
  align-items: center;
}

.search-box {
  width: 100%;
  padding: 16px 20px;
  border-radius: 16px;
  background: rgba(180,0,0,0.12);
  border: 1px solid rgba(255,0,0,0.25);
  display: flex;
  align-items: center;
  gap: 12px;
  transition: border-color 0.3s, box-shadow 0.3s;
}

.search-box:focus-within {
  border-color: rgba(255,0,0,0.6);
  box-shadow: 0 0 20px rgba(255,0,0,0.15);
}

.search-icon {
  width: 20px;
  height: 20px;
  opacity: 0.5;
  flex-shrink: 0;
}

.search-box input {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  color: white;
  font-size: 15px;
  font-family: 'Inter', sans-serif;
  letter-spacing: 0.02em;
}

.search-box input::placeholder {
  color: rgba(255,255,255,0.35);
}

.controls-row {
  display: flex;
  gap: 10px;
  width: 100%;
  justify-content: center;
}

.fav-toggle {
  padding: 11px 22px;
  border-radius: 12px;
  background: rgba(180,0,0,0.12);
  border: 1px solid rgba(255,0,0,0.25);
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  user-select: none;
}

.fav-toggle:hover {
  background: rgba(255,0,0,0.2);
  border-color: rgba(255,0,0,0.5);
}

.fav-toggle.active {
  background: rgba(255,0,0,0.85);
  border-color: rgba(255,0,0,0.9);
  box-shadow: 0 0 20px rgba(255,0,0,0.3);
}

.stop-btn {
  padding: 11px 22px;
  border-radius: 12px;
  background: rgba(180,0,0,0.12);
  border: 1px solid rgba(255,0,0,0.25);
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: white;
  user-select: none;
  font-family: 'Inter', sans-serif;
}

.stop-btn:hover {
  background: rgba(255,0,0,0.4);
  border-color: rgba(255,0,0,0.6);
}

.switch-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  opacity: 0.8;
}

.switch {
  width: 64px;
  height: 32px;
  background: rgba(180,0,0,0.15);
  border: 1px solid rgba(255,0,0,0.3);
  border-radius: 999px;
  position: relative;
  cursor: pointer;
  transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}

.knob {
  width: 26px;
  height: 26px;
  background: white;
  border-radius: 50%;
  position: absolute;
  top: 2px;
  left: 3px;
  transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}

.switch.active {
  background: rgba(255,0,0,0.85);
  border-color: rgba(255,0,0,0.9);
  box-shadow: 0 0 15px rgba(255,0,0,0.3);
}

.switch.active .knob {
  left: 34px;
}

/* Volume slider */
.volume-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  width: 100%;
}

.volume-row {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  max-width: 300px;
}

.volume-icon {
  width: 18px;
  height: 18px;
  opacity: 0.5;
  flex-shrink: 0;
  cursor: pointer;
}

.volume-slider {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 4px;
  border-radius: 4px;
  background: rgba(255,0,0,0.2);
  outline: none;
  cursor: pointer;
}

.volume-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #ff3333;
  cursor: pointer;
  box-shadow: 0 0 10px rgba(255,0,0,0.4);
  transition: transform 0.2s;
}

.volume-slider::-webkit-slider-thumb:hover {
  transform: scale(1.2);
}

.volume-slider::-moz-range-thumb {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #ff3333;
  cursor: pointer;
  border: none;
  box-shadow: 0 0 10px rgba(255,0,0,0.4);
}

.volume-label {
  font-size: 11px;
  opacity: 0.4;
  font-weight: 600;
  letter-spacing: 0.1em;
  min-width: 32px;
  text-align: center;
}

/* Sound count */
.sound-count {
  text-align: center;
  padding: 10px 20px 0;
  font-size: 12px;
  opacity: 0.3;
  letter-spacing: 0.1em;
  font-weight: 600;
  position: relative;
  z-index: 1;
}

/* ================= GRID ================= */

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 18px;
  padding: 20px;
  position: relative;
  z-index: 1;
}

.card {
  position: relative;
  border-radius: 18px;
  overflow: hidden;
  cursor: pointer;
  background: rgba(50,0,0,0.15);
  border: 1px solid rgba(255,0,0,0.2);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  animation: cardIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) backwards;
}

@keyframes cardIn {
  from {
    opacity: 0;
    transform: translateY(20px) scale(0.95);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

.card:hover {
  transform: translateY(-4px) scale(1.03);
  box-shadow: 0 8px 30px rgba(255,0,0,0.2);
  border-color: rgba(255,0,0,0.4);
}

.card:active {
  transform: translateY(-2px) scale(1.01);
}

.card img {
  width: 100%;
  aspect-ratio: 1/1;
  object-fit: cover;
  transition: transform 0.3s;
}

.card:hover img {
  transform: scale(1.05);
}

.img-wrapper {
  overflow: hidden;
  position: relative;
}

/* Playing indicator overlay */
.play-indicator {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.5);
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}

.card.active .play-indicator {
  opacity: 1;
}

.equalizer {
  display: flex;
  align-items: flex-end;
  gap: 4px;
  height: 30px;
}

.eq-bar {
  width: 5px;
  background: #ff3333;
  border-radius: 3px;
  animation: eqBounce 0.6s ease-in-out infinite alternate;
}

.eq-bar:nth-child(1) { height: 30%; animation-delay: 0s; }
.eq-bar:nth-child(2) { height: 70%; animation-delay: 0.15s; }
.eq-bar:nth-child(3) { height: 50%; animation-delay: 0.3s; }
.eq-bar:nth-child(4) { height: 90%; animation-delay: 0.1s; }
.eq-bar:nth-child(5) { height: 40%; animation-delay: 0.25s; }

@keyframes eqBounce {
  from { transform: scaleY(0.3); }
  to { transform: scaleY(1); }
}

.favorite-btn {
  position: absolute;
  top: 10px;
  left: 10px;
  width: 34px;
  height: 34px;
  z-index: 10;
  cursor: pointer;
  transition: transform 0.2s;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
}

.favorite-btn:hover {
  transform: scale(1.2);
}

.favorite-btn:active {
  transform: scale(0.9);
}

.favorite-btn img {
  width: 100%;
  aspect-ratio: auto;
}

.card .title {
  text-align: center;
  padding: 12px 10px;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.03em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.card.active {
  box-shadow: 0 0 30px rgba(255,0,0,0.35);
  border-color: rgba(255,0,0,0.6);
}

.card.active .title {
  color: #ff5555;
}

/* ================= AD CARD ================= */

.ad-card iframe {
  width: 100%;
  aspect-ratio: 1/1;
  border: none;
  border-radius: 10px;
}

/* ================= EMPTY STATE ================= */

.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 60px 20px;
  opacity: 0.4;
}

.empty-state .empty-icon {
  font-size: 48px;
  margin-bottom: 16px;
}

.empty-state p {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.05em;
}

/* ================= KEYBOARD HINTS ================= */

.keyboard-hints {
  position: fixed;
  bottom: 20px;
  right: 20px;
  display: flex;
  gap: 8px;
  z-index: 100;
  opacity: 0.3;
  transition: opacity 0.3s;
}

.keyboard-hints:hover {
  opacity: 0.7;
}

.kbd {
  padding: 4px 10px;
  border-radius: 6px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.05em;
  white-space: nowrap;
}

/* ================= RESPONSIVE ================= */

@media (max-width: 768px) {
  .top-ui {
    padding-top: 160px;
  }

  .panel {
    grid-template-columns: 1fr;
    gap: 20px;
    padding: 25px;
  }

  .panel > .switch-container:first-child {
    order: 2;
    flex-direction: row;
    gap: 15px;
  }

  .panel > .switch-container:last-child {
    order: 3;
    flex-direction: row;
    gap: 15px;
  }

  .center {
    order: 1;
  }

  .grid {
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
    padding: 12px;
  }

  .keyboard-hints {
    display: none;
  }
}
</style>
</head>

<body>

<!-- ================= UI ================= -->

<div class="top-ui">
  <div class="panel">

    <div class="switch-container">
      <div>SPAM</div>
      <div class="switch" id="spamSwitch" title="Spam mode: play overlapping sounds (S)">
        <div class="knob"></div>
      </div>
    </div>

    <div class="center">
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
        </svg>
        <input id="search" placeholder="Search sounds..." autocomplete="off">
      </div>

      <div class="controls-row">
        <div class="fav-toggle" id="favToggle" title="Show favorites only (F)">
          ♥ FAVORITES
        </div>
        <button class="stop-btn" id="stopBtn" title="Stop all sounds (Esc)">
          ■ STOP
        </button>
      </div>

      <div class="volume-container">
        <div class="volume-row">
          <svg class="volume-icon" id="volumeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          </svg>
          <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80">
          <span class="volume-label" id="volumeLabel">80%</span>
        </div>
      </div>
    </div>

    <div class="switch-container">
      <div>LOOP</div>
      <div class="switch" id="loopSwitch" title="Loop mode: repeat sounds (L)">
        <div class="knob"></div>
      </div>
    </div>

  </div>
</div>

<div class="sound-count" id="soundCount"></div>
<div class="grid" id="soundGrid"></div>

<!-- Keyboard hints -->
<div class="keyboard-hints">
  <span class="kbd">S Spam</span>
  <span class="kbd">L Loop</span>
  <span class="kbd">F Favs</span>
  <span class="kbd">Esc Stop</span>
  <span class="kbd">/ Search</span>
</div>

<script>
let allSounds = [];
let favIcons = JSON.parse(localStorage.getItem("favorites") || "{}");

let spamMode = false;
let loopMode = false;
let favOnly = false;
let volume = parseInt(localStorage.getItem("volume") || "80") / 100;

let activeAudios = []; // track all playing audios for stop/volume
let currentAudio = null;
let currentCard = null;
let lastSound = null;

const grid = document.getElementById("soundGrid");
const spamSwitch = document.getElementById("spamSwitch");
const loopSwitch = document.getElementById("loopSwitch");
const favToggle = document.getElementById("favToggle");
const stopBtn = document.getElementById("stopBtn");
const volumeSlider = document.getElementById("volumeSlider");
const volumeLabel = document.getElementById("volumeLabel");
const volumeIcon = document.getElementById("volumeIcon");
const soundCount = document.getElementById("soundCount");

// Init volume slider
volumeSlider.value = volume * 100;
volumeLabel.textContent = Math.round(volume * 100) + "%";

volumeSlider.oninput = () => {
  volume = volumeSlider.value / 100;
  volumeLabel.textContent = Math.round(volume * 100) + "%";
  localStorage.setItem("volume", volumeSlider.value);
  // Update all active audios
  activeAudios.forEach(a => { a.volume = volume; });
  updateVolumeIcon();
};

volumeIcon.onclick = () => {
  if (volume > 0) {
    volumeSlider.value = 0;
  } else {
    volumeSlider.value = 80;
  }
  volumeSlider.oninput();
};

function updateVolumeIcon() {
  const v = volume;
  let paths = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>';
  if (v === 0) {
    paths += '<line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>';
  } else if (v < 0.5) {
    paths += '<path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>';
  } else {
    paths += '<path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>';
  }
  volumeIcon.innerHTML = paths;
}

function stopAll() {
  activeAudios.forEach(a => {
    a.pause();
    a.currentTime = 0;
  });
  activeAudios = [];
  document.querySelectorAll('.card.active').forEach(c => c.classList.remove('active'));
  currentAudio = null;
  currentCard = null;
}

stopBtn.onclick = stopAll;

spamSwitch.onclick = () => {
  spamMode = !spamMode;
  spamSwitch.classList.toggle("active");

  if (!spamMode && lastSound) {
    stopAll();
    const audio = new Audio(lastSound.url);
    audio.volume = volume;
    currentAudio = audio;
    activeAudios.push(audio);
    if (loopMode) audio.loop = true;
    audio.play();
  }
};

loopSwitch.onclick = () => {
  loopMode = !loopMode;
  loopSwitch.classList.toggle("active");
  activeAudios.forEach(a => { a.loop = loopMode; });
};

favToggle.onclick = () => {
  favOnly = !favOnly;
  favToggle.classList.toggle("active");
  render();
};

// Keyboard shortcuts
document.addEventListener("keydown", (e) => {
  // Don't trigger if typing in search
  if (e.target.tagName === "INPUT") {
    if (e.key === "Escape") {
      e.target.blur();
      stopAll();
    }
    return;
  }

  switch(e.key.toLowerCase()) {
    case "s":
      spamSwitch.click();
      break;
    case "l":
      loopSwitch.click();
      break;
    case "f":
      favToggle.click();
      break;
    case "escape":
      stopAll();
      break;
    case "/":
      e.preventDefault();
      document.getElementById("search").focus();
      break;
  }
});

fetch("./assets/Files/Soundboard/sound.json")
  .then(res => res.json())
  .then(data => {
    allSounds = data;
    render();
  });

function createAdCard() {
  const adCard = document.createElement("div");
  adCard.className = "card ad-card";

  const iframe = document.createElement("iframe");
  iframe.src = "./ads.html";
  iframe.sandbox = "allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox";
  iframe.referrerPolicy = "no-referrer";

  adCard.appendChild(iframe);
  return adCard;
}

function render() {
  const searchVal = document.getElementById("search").value.toLowerCase();

  let list = allSounds.filter(s =>
    s.name.toLowerCase().includes(searchVal)
  );

  if (favOnly) {
    list = list.filter(s => favIcons[s.name]);
  }

  // Update count
  soundCount.textContent = list.length + " sound" + (list.length !== 1 ? "s" : "") + (searchVal ? ` matching "${searchVal}"` : "") + (favOnly ? " (favorites)" : "");

  grid.innerHTML = "";

  if (list.length === 0) {
    const empty = document.createElement("div");
    empty.className = "empty-state";
    empty.innerHTML = `
      <div class="empty-icon">${favOnly ? "♥" : "🔇"}</div>
      <p>${favOnly ? "No favorites yet. Click the heart on any sound." : "No sounds found."}</p>
    `;
    grid.appendChild(empty);
    return;
  }

  list.forEach((sound, index) => {
    // AD EVERY 20 SOUNDS
    if (index !== 0 && index % 20 === 0) {
      grid.appendChild(createAdCard());
    }

    const card = document.createElement("div");
    card.className = "card";
    card.style.animationDelay = `${Math.min(index * 0.03, 0.5)}s`;

    const isFav = favIcons[sound.name];
    const icon = isFav ? "./assets/icons/h-fill.png" : "./assets/icons/h-empty.png";

    card.innerHTML = `
      <div class="favorite-btn"><img src="${icon}" alt="favorite"></div>
      <div class="img-wrapper">
        <img src="${sound.cover}" alt="${sound.name}" loading="lazy">
        <div class="play-indicator">
          <div class="equalizer">
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
          </div>
        </div>
      </div>
      <div class="title">${sound.name}</div>
    `;

    const favBtn = card.querySelector(".favorite-btn");
    favBtn.onclick = (e) => {
      e.stopPropagation();
      favIcons[sound.name] = !favIcons[sound.name];
      localStorage.setItem("favorites", JSON.stringify(favIcons));

      // Animate heart
      favBtn.style.transform = "scale(1.3)";
      setTimeout(() => { favBtn.style.transform = ""; }, 200);

      render();
    };

    card.onmousedown = () => {
      lastSound = sound;

      if (!spamMode) {
        stopAll();
      }

      const audio = new Audio(sound.url);
      audio.volume = volume;
      currentAudio = audio;
      currentCard = card;
      activeAudios.push(audio);

      if (loopMode) audio.loop = true;

      audio.play();
      card.classList.add("active");

      audio.onended = () => {
        card.classList.remove("active");
        activeAudios = activeAudios.filter(a => a !== audio);
      };
    };

    grid.appendChild(card);
  });
}

document.getElementById("search").addEventListener("input", render);

// Initialize volume icon
updateVolumeIcon();
</script>
