<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Games</title>
<link rel="stylesheet" href__="./assets/curser/curser.css">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  background: #0a0a0a;
  font-family: 'Segoe UI', Arial, sans-serif;
  color: white;
  min-height: 100vh;
}

.top-ui {
  padding: 240px 20px 20px;
  display: flex;
  justify-content: center;
}

.panel {
  width: 900px;
  max-width: 95%;
  display: flex;
  flex-direction: column;
  gap: 20px;
  padding: 40px;
  border-radius: 25px;
  background: rgba(120, 0, 0, 0.15);
  backdrop-filter: blur(25px);
  border: 1px solid rgba(255, 0, 0, 0.4);
  box-shadow: 0 0 50px rgba(255, 0, 0, 0.2);
  position: relative;
  z-index: 1;
}

.search-box {
  padding: 20px 25px;
  border-radius: 20px;
  background: rgba(180, 0, 0, 0.2);
  border: 1px solid rgba(255, 0, 0, 0.4);
  display: flex;
  align-items: center;
  gap: 12px;
  transition: border-color 0.3s, box-shadow 0.3s;
}

.search-box:focus-within {
  border-color: rgba(255, 0, 0, 0.7);
  box-shadow: 0 0 20px rgba(255, 0, 0, 0.15);
}

.search-icon {
  font-size: 18px;
  opacity: 0.6;
}

.search-box input {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  color: white;
  font-size: 16px;
  padding: 4px 0;
}

.search-box input::placeholder {
  color: rgba(255, 255, 255, 0.4);
}

.controls-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}

.game-count {
  font-size: 14px;
  color: rgba(255, 255, 255, 0.6);
  font-weight: 500;
  letter-spacing: 0.5px;
}

.game-count span {
  color: #ff4444;
  font-weight: 700;
  font-size: 16px;
}

.filter-container {
  width: 220px;
  padding: 10px 15px;
  border-radius: 15px;
  background: rgba(180, 0, 0, 0.15);
  border: 1px solid rgba(255, 0, 0, 0.4);
  backdrop-filter: blur(15px);
  position: relative;
  cursor: pointer;
  user-select: none;
  color: white;
  font-weight: bold;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: border-color 0.3s;
}

.filter-container:hover {
  border-color: rgba(255, 0, 0, 0.7);
}

.filter-arrow {
  transition: transform 0.3s;
  font-size: 12px;
}

.filter-arrow.open {
  transform: rotate(180deg);
}

.dropdown-options {
  position: absolute;
  top: calc(100% + 8px);
  left: 0;
  width: 100%;
  background: rgba(40, 0, 0, 0.9);
  backdrop-filter: blur(20px);
  border-radius: 12px;
  border: 1px solid rgba(255, 0, 0, 0.4);
  display: none;
  flex-direction: column;
  z-index: 9999;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
}

.dropdown-options.show {
  display: flex;
}

.dropdown-options div {
  padding: 10px 14px;
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
  color: rgba(255, 255, 255, 0.8);
  font-size: 14px;
  font-weight: 500;
}

.dropdown-options div:hover {
  background: rgba(255, 0, 0, 0.4);
  color: white;
}

.dropdown-options div.active {
  background: rgba(255, 0, 0, 0.25);
  color: #ff4444;
}

#games {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  position: relative;
  aspect-ratio: 4 / 5;
  border-radius: 20px;
  overflow: hidden;
  cursor: pointer;
  background: rgba(50, 0, 0, 0.2);
  border: 1px solid rgba(255, 0, 0, 0.3);
  backdrop-filter: blur(10px);
  transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
}

.card:hover {
  transform: scale(1.05);
  border-color: #ff0000;
  box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
}

.card img, .card iframe {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.favorite-btn {
  position: absolute;
  top: 10px;
  left: 10px;
  width: 32px;
  height: 32px;
  cursor: pointer;
  z-index: 10;
  transition: transform 0.2s;
}

.favorite-btn:hover {
  transform: scale(1.2);
}

.favorite-btn img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.card::after {
  content: "";
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 50%;
  background: linear-gradient(to top, rgba(0, 0, 0, 0.95), transparent);
  pointer-events: none;
}

.card .title {
  position: absolute;
  bottom: 12px;
  width: 100%;
  text-align: center;
  font-weight: bold;
  font-size: 14px;
  z-index: 2;
  text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
}

.no-results {
  grid-column: 1 / -1;
  text-align: center;
  padding: 60px 20px;
  color: rgba(255, 255, 255, 0.4);
  font-size: 18px;
}

.pagination {
  text-align: center;
  padding: 30px 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
}

.pagination button {
  padding: 10px 20px;
  background: rgba(180, 0, 0, 0.2);
  border: 1px solid rgba(255, 0, 0, 0.4);
  color: white;
  cursor: pointer;
  border-radius: 12px;
  font-weight: 600;
  font-size: 14px;
  transition: background 0.2s, border-color 0.2s, transform 0.2s;
}

.pagination button:hover:not(:disabled) {
  background: rgba(255, 0, 0, 0.4);
  border-color: #ff0000;
  transform: translateY(-1px);
}

.pagination button:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

.pagination .page-info {
  font-size: 14px;
  color: rgba(255, 255, 255, 0.6);
  min-width: 100px;
}
</style>
</head>
<body>
<script>
(function() {
  // ─── Inject Styles ───────────────────────────────────────────────
  var style = document.createElement('style');
  style.textContent = `
    #bubble-nav {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999999;
      display: flex;
      gap: 8px;
      padding: 8px 16px;
      background: linear-gradient(135deg, #1a1a1a 0%, #2d0000 50%, #1a1a1a 100%);
      border: 2px solid #cc0000;
      border-radius: 50px;
      box-shadow: 0 4px 24px rgba(200,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.05);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      backdrop-filter: blur(12px);
      white-space: nowrap;
    }
    .bnav-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      color: #fff;
      border-radius: 50px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: background 0.18s ease, box-shadow 0.18s ease, transform 0.12s ease;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.08);
      white-space: nowrap;
    }
    .bnav-btn.home {
      background: #cc0000;
      border-color: #cc0000;
    }
    .bnav-btn:hover {
      background: #cc0000 !important;
      border-color: #cc0000 !important;
      box-shadow: 0 0 14px rgba(204,0,0,0.6);
      transform: scale(1.06);
    }
    .bnav-btn:active {
      transform: scale(0.96);
    }
    @media (max-width: 720px) {
      #bubble-nav {
        left: 8px !important;
        right: 8px !important;
        transform: none !important;
        overflow-x: auto;
        scrollbar-width: none;
      }
      #bubble-nav::-webkit-scrollbar { display: none; }
    }
  `;
  document.head.appendChild(style);

  // ─── Build Nav ───────────────────────────────────────────────────
  var nav = document.createElement('div');
  nav.id = 'bubble-nav';

  var links = [
    {
      label: 'Home',
      href: '/index.html',
      home: true,
      icon: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>'
    },
    { label: 'Games',       href: '/g.html'      },
    { label: 'Movies',      href: '/movies.html'  },
    { label: 'Proxy',       href: '/proxy.html'   },
    { label: 'AI',          href: '/ai.html'      },
    { label: 'Sound Board', href: './sb.html'     },
  ];

  links.forEach(function(item) {
    var a = document.createElement('a');
    a.className = 'bnav-btn' + (item.home ? ' home' : '');
    if (item.icon) a.innerHTML = item.icon + item.label;
    else a.textContent = item.label;

    // unchanged behavior (no popup system involved anymore)
    a.addEventListener('click', function(e) {
      e.preventDefault();
      window.location.href = item.href;
    });

    nav.appendChild(a);
  });

  function mount() {
    document.body.insertBefore(nav, document.body.firstChild);
  }

  if (document.body) {
    mount();
  } else {
    document.addEventListener('DOMContentLoaded', mount);
  }

  // ─── REMOVED ENTIRELY ───────────────────────────────────────────
  // - goingInternal flag
  // - beforeunload handler
  // - external link confirmation system

})();
</script>
<div class="top-ui">
  <div class="panel">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input id="search" placeholder="Search games...">
    </div>

    <div class="controls-row">
      <div class="game-count" id="gameCount"></div>

      <div class="filter-container" id="filter">
        <span id="filterLabel">Oldest → Newest</span>
        <span class="filter-arrow" id="filterArrow">▼</span>
        <div class="dropdown-options" id="dropdown">
          <div data-value="old">Oldest → Newest</div>
          <div data-value="new">Newest → Oldest</div>
          <div data-value="az">A → Z</div>
          <div data-value="za">Z → A</div>
          <div data-value="fav">Favorites</div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="games"></div>

<div class="pagination" id="pagination">
  <button id="prevBtn" onclick="prevPage()">← Prev</button>
  <span class="page-info" id="pageInfo">Page 1</span>
  <button id="nextBtn" onclick="nextPage()">Next →</button>
</div>

<script>
const API = "./assets/Files/Games/zones.json";

let gamesData = [];
let currentSort = "old";
let currentPage = 1;
let totalFilteredCount = 0;

let favIcons = JSON.parse(localStorage.getItem("favorites") || "{}");

async function loadGames() {
  const res = await fetch(API);
  const data = await res.json();
  gamesData = data.data;
  updateDisplay();
}

function getFilteredList() {
  let list = [...gamesData];

  const searchVal = document.getElementById("search").value.toLowerCase().trim();
  if (searchVal) list = list.filter(g => g.name.toLowerCase().includes(searchVal));

  if (currentSort === "new") list.reverse();
  else if (currentSort === "az") list.sort((a, b) => a.name.localeCompare(b.name));
  else if (currentSort === "za") list.sort((a, b) => b.name.localeCompare(a.name));
  else if (currentSort === "fav") list = list.filter(g => favIcons[g.name]);

  return list;
}

function updateDisplay() {
  const list = getFilteredList();
  totalFilteredCount = list.length;

  // Update game count
  const searchVal = document.getElementById("search").value.trim();
  const countEl = document.getElementById("gameCount");
  if (searchVal || currentSort === "fav") {
    countEl.innerHTML = `Showing <span>${totalFilteredCount}</span> of <span>${gamesData.length}</span> games`;
  } else {
    countEl.innerHTML = `<span>${gamesData.length}</span> games`;
  }

  const container = document.getElementById("games");
  const containerWidth = container.clientWidth;
  const cardMinWidth = 240;
  const gap = 20;
  const columns = Math.max(1, Math.floor((containerWidth + gap) / (cardMinWidth + gap)));

  const ITEMS_PER_PAGE = columns * 12;
  const totalPages = Math.max(1, Math.ceil(list.length / ITEMS_PER_PAGE));
  if (currentPage > totalPages) currentPage = totalPages;

  const start = (currentPage - 1) * ITEMS_PER_PAGE;
  const paginated = list.slice(start, start + ITEMS_PER_PAGE);

  document.getElementById("pageInfo").textContent = `Page ${currentPage} / ${totalPages}`;

  // Enable/disable pagination buttons
  document.getElementById("prevBtn").disabled = currentPage <= 1;
  document.getElementById("nextBtn").disabled = currentPage >= totalPages;

  // Hide pagination if only 1 page
  document.getElementById("pagination").style.display = totalPages <= 1 ? "none" : "flex";

  renderGamesWithAds(paginated, columns);
}

function renderGamesWithAds(list, columns) {
  const container = document.getElementById("games");
  container.innerHTML = "";

  if (list.length === 0) {
    container.innerHTML = '<div class="no-results">No games found</div>';
    return;
  }

  const AD_INTERVAL = columns * 3;

  list.forEach((game, index) => {
    const card = document.createElement("div");
    card.className = "card";

    const isFav = favIcons[game.name] || false;
    const favIcon = isFav ? "./assets/icons/h-fill.png" : "./assets/icons/h-empty.png";

    card.innerHTML = `
      <div class="favorite-btn"><img src="${favIcon}"></div>
      <img src="${game.cover}" loading="lazy">
      <div class="title">${game.name}</div>
    `;

    card.addEventListener("click", e => {
      if (!e.target.closest(".favorite-btn")) {
        window.location.href = "g-frame.html?ID=" + encodeURIComponent(game.url);
      }
    });

    const favBtn = card.querySelector(".favorite-btn img");
    favBtn.addEventListener("click", e => {
      e.stopPropagation();
      favIcons[game.name] = !favIcons[game.name];
      favBtn.src = favIcons[game.name] ? "./assets/icons/h-fill.png" : "./assets/icons/h-empty.png";
      localStorage.setItem("favorites", JSON.stringify(favIcons));
      updateDisplay();
    });

    container.appendChild(card);

    if ((index + 1) % AD_INTERVAL === 0) {
      const adCard = document.createElement("div");
      adCard.className = "card";
      adCard.innerHTML = `<iframe src="./ads.html" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox" referrerpolicy="no-referrer"></iframe>`;
      container.appendChild(adCard);
    }
  });
}

function nextPage() {
  currentPage++;
  updateDisplay();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function prevPage() {
  if (currentPage > 1) currentPage--;
  updateDisplay();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

document.getElementById("search").addEventListener("input", () => {
  currentPage = 1;
  updateDisplay();
});

// Dropdown logic
const filter = document.getElementById("filter");
const dropdown = document.getElementById("dropdown");
const filterArrow = document.getElementById("filterArrow");

filter.addEventListener("click", () => {
  const isOpen = dropdown.classList.toggle("show");
  filterArrow.classList.toggle("open", isOpen);
});

dropdown.querySelectorAll("div").forEach(option => {
  option.addEventListener("click", (e) => {
    e.stopPropagation();
    currentSort = option.dataset.value;
    document.getElementById("filterLabel").textContent = option.textContent;
    dropdown.classList.remove("show");
    filterArrow.classList.remove("open");

    // Mark active
    dropdown.querySelectorAll("div").forEach(o => o.classList.remove("active"));
    option.classList.add("active");

    currentPage = 1;
    updateDisplay();
  });
});

// Set initial active
dropdown.querySelector('[data-value="old"]').classList.add("active");

document.addEventListener("click", e => {
  if (!filter.contains(e.target)) {
    dropdown.classList.remove("show");
    filterArrow.classList.remove("open");
  }
});

window.addEventListener("resize", updateDisplay);

loadGames();
</script>

</body>
</html>
