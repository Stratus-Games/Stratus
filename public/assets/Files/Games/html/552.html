<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hypper Drive 2 | Sonic the Hedgehog (Game Gear)</title>

<style>
html, body {
  height: 100%;
  margin: 0;
  background: #000;
  font-family: monospace;
  font-weight: bold;
  overflow: hidden;
  color: #fff;
}

#game {
  position: absolute;
  inset: 0;
  background: #000;
}

/* ===== Hypper Drive 2 Loader ===== */
#loading {
  position: absolute;
  inset: 0;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  z-index: 999;
}

#logoWrap {
  position: relative;
  width: 260px;
  height: 260px;
}

#logoWrap img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

svg {
  position: absolute;
  inset: 0;
  transform: rotate(-90deg);
}

circle {
  fill: none;
  stroke-width: 12;
  stroke-linecap: round;
}

#bg {
  stroke: rgba(255,255,255,0.08);
}

#fg {
  stroke: red;
  stroke-dasharray: 565.48;
  stroke-dashoffset: 565.48;
  transition: stroke-dashoffset 0.15s linear;
}

#text {
  margin-top: 18px;
  font-size: 15px;
}
</style>
</head>

<body>

<div id="game"></div>

<div id="loading">
  <div id="logoWrap">
    <img src="https://raw.githubusercontent.com/GLITCHED-OVERRIDE/Hypper-Drive-2/main/H.D.2.png">
    <svg viewBox="0 0 200 200">
      <circle id="bg" cx="100" cy="100" r="90"></circle>
      <circle id="fg" cx="100" cy="100" r="90"></circle>
    </svg>
  </div>
  <div id="text">Loading Sonic the Hedgehog…</div>
</div>

<script>
const fg = document.getElementById("fg");
const loading = document.getElementById("loading");

(async () => {

  window.EJS_player = "#game";
  window.EJS_core = "segaGG";
  window.EJS_gameName = "Sonic the Hedgehog";
  window.EJS_color = "#0064ff";
  window.EJS_startOnLoaded = true;

  window.EJS_pathtodata =
    "https://cdn.jsdelivr.net/gh/genizy/emu@master/";

  window.EJS_gameUrl =
    "https://cdn.jsdelivr.net/gh/GLITCHED-OVERRIDE/Hypper-Drive-2@main/Games/Files/Source/SSG/Sonic%20The%20Hedgehog/Sonic%20The%20Hedgehog%20(World)%20(Rev%20A).zip";

  const script = document.createElement("script");
  script.src =
    "https://cdn.jsdelivr.net/gh/genizy/emu@master/loader.js";

  script.onload = () => {
    fg.style.strokeDashoffset = 0;
    loading.style.opacity = "0";
    loading.style.transition = "opacity 300ms";
    setTimeout(() => loading.remove(), 350);
  };

  document.body.appendChild(script);
})();
</script>

</body>
</html>
