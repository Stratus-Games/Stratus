<!DOCTYPE HTML>
<html>

<head>
    
    
    
    <meta charset='utf8'>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
        }

        #ruffle {
            width: 100%;
            height: 100%;
        }
    #sidebarad1,
#sidebarad2 {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  width: 160px;
  height: 600px;
  padding: 0;
  margin: 0;
  z-index: 999999;
}
#sidebarad1 {
  left: 0;
}
#sidebarad2 {
  right: 0;
}
.sidebar-close {
  position: absolute;
  top: 0;
  right: 0;
  width: 22px;
  height: 22px;
  line-height: 22px;
  text-align: center;
  background: rgba(0,0,0,0.7);
  color: #fff;
  font-size: 14px;
  cursor: pointer;
  user-select: none;
  z-index: 10;
}
.sidebar-frame {
  width: 160px;
  height: 600px;
  border: none;
  display: block;
}
</style>
</head>

<body>
    <div id='ruffle'></div>
    <script src='https://unpkg.com/@ruffle-rs/ruffle'></script>
    <script>
        var ruffle = window.RufflePlayer.newest();
        var container = document.getElementById('ruffle');
        var player = ruffle.createPlayer();
        container.appendChild(player);
        player.load({
            url: 'https://cdn.jsdelivr.net/gh/genizy/google-class@main/swf/roadoffury.swf'
        });
        const resizePlayer = () => {
            container.style.width = window.innerWidth + 'px';
            container.style.height = window.innerHeight + 'px';
            player.style.width = '100%';
            player.style.height = '100%';
        };
        resizePlayer();
        window.addEventListener('resize', resizePlayer);
    </script>

</html>
