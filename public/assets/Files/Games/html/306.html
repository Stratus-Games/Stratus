<!DOCTYPE html>
<html lang="en">

<head>
  
  
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <base href="https://cdn.jsdelivr.net/gh/genizy/google-class/temple-run-2/">
  <title>Temple Run 2</title>
  <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/genizy/google-class/temple-run-2/global.css" />
  <link rel="manifest" href="https://cdn.jsdelivr.net/gh/genizy/google-class/temple-run-2/appmanifest.json">
  <link rel="icon" href="https://cdn.jsdelivr.net/gh/genizy/google-class/temple-run-2/img/og-icon.png">
  <style>
    html,
    body {
      overflow: hidden;
      width: 100%;
      height: 100%;
      min-height: 100%;
      max-height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      margin: 0;
      padding: 0;
      -webkit-text-size-adjust: none;
      touch-action: pan-x pan-y;
    }
  #sidebarad1,
#sidebarad2 {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  width: 160px;
  height: 600px;
  padding: 0;
  margin: 0;
  z-index: 999999;
}
#sidebarad1 {
  left: 0;
}
#sidebarad2 {
  right: 0;
}
.sidebar-close {
  position: absolute;
  top: 0;
  right: 0;
  width: 22px;
  height: 22px;
  line-height: 22px;
  text-align: center;
  background: rgba(0,0,0,0.7);
  color: #fff;
  font-size: 14px;
  cursor: pointer;
  user-select: none;
  z-index: 10;
}
.sidebar-frame {
  width: 160px;
  height: 600px;
  border: none;
  display: block;
}
</style>
  <script defer src="https://cdn.jsdelivr.net/gh/genizy/google-class/temple-run-2/bundle.js"></script>
</head>

</html>
