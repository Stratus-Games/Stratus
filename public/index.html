<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stratus Games</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  background: #0a0a0a;
  font-family: 'Segoe UI', Arial, sans-serif;
  color: white;
  min-height: 100vh;
}

/* PANEL */
.top-ui {
  padding: 160px 20px 40px;
  display: flex;
  justify-content: center;
}

.panel {
  width: 1000px;
  max-width: 95%;
  display: flex;
  flex-direction: column;
  gap: 30px;
  padding: 50px;
  border-radius: 25px;
  background: rgba(120, 0, 0, 0.15);
  backdrop-filter: blur(25px);
  border: 1px solid rgba(255, 0, 0, 0.4);
  box-shadow: 0 0 60px rgba(255, 0, 0, 0.2);
  text-align: center;
}

/* LOGO */
.logo {
  display: flex;
  justify-content: center;
}

.logo img {
  width: 201px;
  height: 44px;
  object-fit: contain;
}

/* GRID */
.tabs {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 25px;
}

/* TAB */
.tab {
  padding: 40px 20px;
  border-radius: 20px;
  background: rgba(50, 0, 0, 0.2);
  border: 1px solid rgba(255, 0, 0, 0.35);
  backdrop-filter: blur(15px);
  cursor: pointer;
  transition: all 0.25s ease;
  position: relative;
  overflow: hidden;
}

.tab:hover {
  transform: scale(1.05);
  border-color: #ff0000;
  box-shadow: 0 0 25px rgba(255, 0, 0, 0.4);
}

.tab::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at top, rgba(255,0,0,0.2), transparent);
  opacity: 0;
  transition: 0.3s;
}

.tab:hover::before {
  opacity: 1;
}

/* ICONS (UNCHANGED IMAGES) */
.icon {
  width: 48px;
  height: 48px;
  margin: 0 auto 12px;
}

.icon img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* TEXT */
.tab h2 {
  margin: 0;
  font-size: 20px;
}

.tab p {
  margin-top: 8px;
  font-size: 13px;
  color: rgba(255,255,255,0.6);
}

/* FOOTER */
.footer {
  font-size: 13px;
  color: rgba(255,255,255,0.4);
}
</style>
</head>

<body>

<!-- NAV -->
<script>
(function() {
  // ─── Inject Styles ───────────────────────────────────────────────
  var style = document.createElement('style');
  style.textContent = `
    #bubble-nav {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999999;
      display: flex;
      gap: 8px;
      padding: 8px 16px;
      background: linear-gradient(135deg, #1a1a1a 0%, #2d0000 50%, #1a1a1a 100%);
      border: 2px solid #cc0000;
      border-radius: 50px;
      box-shadow: 0 4px 24px rgba(200,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.05);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      backdrop-filter: blur(12px);
      white-space: nowrap;
    }
    .bnav-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      color: #fff;
      border-radius: 50px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: background 0.18s ease, box-shadow 0.18s ease, transform 0.12s ease;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.08);
      white-space: nowrap;
    }
    .bnav-btn.home {
      background: #cc0000;
      border-color: #cc0000;
    }
    .bnav-btn:hover {
      background: #cc0000 !important;
      border-color: #cc0000 !important;
      box-shadow: 0 0 14px rgba(204,0,0,0.6);
      transform: scale(1.06);
    }
    .bnav-btn:active {
      transform: scale(0.96);
    }
    @media (max-width: 720px) {
      #bubble-nav {
        left: 8px !important;
        right: 8px !important;
        transform: none !important;
        overflow-x: auto;
        scrollbar-width: none;
      }
      #bubble-nav::-webkit-scrollbar { display: none; }
    }
  `;
  document.head.appendChild(style);

  // ─── Build Nav ───────────────────────────────────────────────────
  var nav = document.createElement('div');
  nav.id = 'bubble-nav';

  var links = [
    {
      label: 'Home',
      href: '/index.html',
      home: true,
      icon: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>'
    },
    { label: 'Games',       href: '/g.html'      },
    { label: 'Movies',      href: '/movies.html'  },
    { label: 'Proxy',       href: '/proxy.html'   },
    { label: 'AI',          href: '/ai.html'      },
    { label: 'Sound Board', href: './sb.html'     },
  ];

  links.forEach(function(item) {
    var a = document.createElement('a');
    a.className = 'bnav-btn' + (item.home ? ' home' : '');
    if (item.icon) a.innerHTML = item.icon + item.label;
    else a.textContent = item.label;

    // unchanged behavior (no popup system involved anymore)
    a.addEventListener('click', function(e) {
      e.preventDefault();
      window.location.href = item.href;
    });

    nav.appendChild(a);
  });

  function mount() {
    document.body.insertBefore(nav, document.body.firstChild);
  }

  if (document.body) {
    mount();
  } else {
    document.addEventListener('DOMContentLoaded', mount);
  }

  // ─── REMOVED ENTIRELY ───────────────────────────────────────────
  // - goingInternal flag
  // - beforeunload handler
  // - external link confirmation system

})();
</script>
<!-- UI -->
<div class="top-ui">
  <div class="panel">

    <div class="logo">
      <img src="./stratus.png">
    </div>

    <div class="tabs">

      <div class="tab" onclick="go('g.html')">
        <div class="icon"><img src="./assets/icons/game.png"></div>
        <h2>Games</h2>
        <p>Play all available games</p>
      </div>

      <div class="tab" onclick="go('proxy.html')">
        <div class="icon"><img src="./assets/icons/browser.png"></div>
        <h2>Proxy</h2>
        <p>Browse freely</p>
      </div>

      <div class="tab" onclick="go('movie.html')">
        <div class="icon"><img src="./assets/icons/movies.png"></div>
        <h2>Movies</h2>
        <p>Watch content</p>
      </div>

      <div class="tab" onclick="go('ai.html')">
        <div class="icon"><img src="./assets/icons/ai.png"></div>
        <h2>AI</h2>
        <p>Use AI tools</p>
      </div>

      <div class="tab" onclick="go('sb.html')">
        <div class="icon"><img src="./assets/icons/sb.png"></div>
        <h2>Soundboard</h2>
        <p>Play sounds</p>
      </div>

            <div class="tab" onclick="go('music.html')">
        <h2>Music-Beta(buggy)</h2>
        <p>listen to music</p>
      </div>
    </div>

    <div class="footer">Stratus Games ©</div>

  </div>
</div>

<script>
function go(p){ location.href=p; }
</script>

</body>
</html>
