<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hypper Drive 2 | Bubsy (Genesis)</title>

<style>
html, body {
  height: 100%;
  margin: 0;
  background: #000;
  font-family: monospace;
  font-weight: bold;
  overflow: hidden;
  color: #fff;
}

#error {
  position: absolute;
  top: 18px;
  left: 50%;
  transform: translateX(-50%);
  color: #f33;
  z-index: 1000;
}

#game {
  position: absolute;
  inset: 0;
  background: #000;
}

/* ===== Hypper Drive 2 Loader ===== */
#loading {
  position: absolute;
  inset: 0;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  z-index: 999;
}

#logoWrap {
  position: relative;
  width: 260px;
  height: 260px;
}

#logoWrap img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

svg {
  position: absolute;
  inset: 0;
  transform: rotate(-90deg);
}

circle {
  fill: none;
  stroke-width: 12;
  stroke-linecap: round;
}

#bg {
  stroke: rgba(255,255,255,0.08);
}

#fg {
  stroke: red;
  stroke-dasharray: 565.48;
  stroke-dashoffset: 565.48;
  transition: stroke-dashoffset 0.12s linear;
}

#text {
  margin-top: 18px;
  font-size: 15px;
}
</style>
</head>

<body>

<div id="error"></div>
<div id="game"></div>

<div id="loading">
  <div id="logoWrap">
    <img src="https://raw.githubusercontent.com/GLITCHED-OVERRIDE/Hypper-Drive-2/main/H.D.2.png">
    <svg viewBox="0 0 200 200">
      <circle id="bg" cx="100" cy="100" r="90"></circle>
      <circle id="fg" cx="100" cy="100" r="90"></circle>
    </svg>
  </div>
  <div id="text">Loading Bubsy…</div>
</div>

<script>
const fg = document.getElementById("fg");
const loading = document.getElementById("loading");
const error = document.getElementById("error");

(async () => {
  try {
    /* ===== EmulatorJS config (UNCHANGED LINKS) ===== */
    window.EJS_player = "#game";
    window.EJS_core = "segaMD";
    window.EJS_color = "#000000";
    window.EJS_startOnLoaded = true;
    window.EJS_pathtodata =
      "https://cdn.jsdelivr.net/gh/a456pur/seraph@81f551ca0aa8e3d6018d32d8ac5904ac9bc78f76/storage/emulatorjs/data";
    window.EJS_gameUrl =
      "https://cdn.jsdelivr.net/gh/GLITCHED-OVERRIDE/Hypper-Drive-2@main/Games/Files/Source/Sega Genisis/Bubsy/Bubsy in - Claws Encounters of the Furred Kind (USA, Europe).zip";

    const loader = document.createElement("script");
    loader.src =
      "https://cdn.jsdelivr.net/gh/a456pur/seraph@81f551ca0aa8e3d6018d32d8ac5904ac9bc78f76/storage/emulatorjs/data/loader.js";

    loader.onload = () => {
      fg.style.strokeDashoffset = 0;
      loading.style.opacity = "0";
      loading.style.transition = "opacity 300ms";
      setTimeout(() => loading.remove(), 350);
    };

    loader.onerror = () =>
      error.textContent = "Failed to load EmulatorJS core";

    document.body.appendChild(loader);

    /* ===== Cloak (UNCHANGED) ===== */
    const cloak = document.createElement("script");
    cloak.src =
      "https://cdn.jsdelivr.net/gh/a456pur/seraph@ae2fcc6d6a9cd051654fcc0519080db1f79cf2a7/storage/js/cloak.js";
    document.body.appendChild(cloak);

  } catch (e) {
    error.textContent = "Error: " + e.message;
    loading.remove();
    console.error(e);
  }
})();
</script>

</body>
        </html>
