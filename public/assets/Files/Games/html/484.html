<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hypper Drive 2 | Super Mario 64</title>
<base href="https://cdn.jsdelivr.net/gh/a456pur/seraph@main/storage/emulatorjs/">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
html, body {
  height: 100%;
  margin: 0;
  background: #000;
  font-family: monospace;
  font-weight: bold;
  overflow: hidden;
  color: #fff;
}

#error {
  position: absolute;
  top: 18px;
  left: 50%;
  transform: translateX(-50%);
  color: #f33;
  font-size: 16px;
  z-index: 1000;
}

#game {
  position: absolute;
  inset: 0;
  background: #000;
}

/* ===== Loading Overlay ===== */
#loadingOverlay {
  position: absolute;
  inset: 0;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  z-index: 999;
}

#logoWrap {
  position: relative;
  width: 260px;
  height: 260px;
}

#logoWrap img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

svg {
  position: absolute;
  inset: 0;
  transform: rotate(-90deg);
}

circle {
  fill: none;
  stroke-width: 12;
  stroke-linecap: round;
}

#bgCircle {
  stroke: rgba(255,255,255,0.07);
}

#fgCircle {
  stroke: red;
  stroke-dasharray: 565.48;
  stroke-dashoffset: 565.48;
  transition: stroke-dashoffset 0.15s linear;
}

#loadingText {
  margin-top: 18px;
  font-size: 15px;
}
</style>
</head>

<body>

<div id="error"></div>
<div id="game"></div>

<!-- Loading Screen -->
<div id="loadingOverlay">
  <div id="logoWrap">
    <img src="https://raw.githubusercontent.com/GLITCHED-OVERRIDE/Hypper-Drive-2/refs/heads/main/H.D.2.png">
    <svg viewBox="0 0 200 200">
      <circle id="bgCircle" cx="100" cy="100" r="90"></circle>
      <circle id="fgCircle" cx="100" cy="100" r="90"></circle>
    </svg>
  </div>
  <div id="loadingText">Loading Super Mario 64…</div>
</div>

<script>
const romUrl =
"https://cdn.jsdelivr.net/gh/GLITCHED-OVERRIDE/Hypper-Drive-2@main/Games/Files/Source/N64/Super Mario 64/Super Mario 64 (USA).zip";

const fg = document.getElementById("fgCircle");
const error = document.getElementById("error");
const overlay = document.getElementById("loadingOverlay");

(async () => {
  try {
    const head = await fetch(romUrl, { method: "HEAD" });
    const total = Number(head.headers.get("content-length")) || 0;

    const res = await fetch(romUrl);
    if (!res.ok) throw new Error("ROM fetch failed");

    const reader = res.body.getReader();
    const chunks = [];
    let received = 0;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      chunks.push(value);
      received += value.length;

      if (total) {
        fg.style.strokeDashoffset = 565.48 * (1 - received / total);
      }
    }

    const size = chunks.reduce((s, c) => s + c.length, 0);
    const merged = new Uint8Array(size);
    let offset = 0;
    for (const c of chunks) {
      merged.set(c, offset);
      offset += c.length;
    }

    const blobUrl = URL.createObjectURL(new Blob([merged]));

    window.EJS_player = "#game";
    window.EJS_core = "n64";
    window.EJS_gameName = "Hypper Drive 2 | Super Mario 64";
    window.EJS_gameUrl = blobUrl;
    window.EJS_pathtodata = "data/";
    window.EJS_startOnLoaded = true;

    const script = document.createElement("script");
    script.src = "data/loader.js";

    script.onload = () => {
      overlay.style.opacity = "0";
      overlay.style.transition = "opacity 300ms";
      setTimeout(() => overlay.remove(), 350);
    };

    script.onerror = () => {
      error.textContent = "Failed to load EmulatorJS core";
      overlay.remove();
    };

    document.body.appendChild(script);

  } catch (e) {
    error.textContent = "Error: " + e.message;
    overlay.remove();
    console.error(e);
  }
})();
</script>

</body>
  </html>
