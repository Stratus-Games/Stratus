<!DOCTYPE html>
<html lang="en-us">

<head>
  
  
  
  <meta charset="utf-8">
  <title>Monster Tracks</title>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/gh/genizy/google-class@23207b238c7c587d12da3cac4233366120ea47c0/monster-tracks/Jump_Gamemonetize.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/genizy/google-class/monster-tracks/webapp/fancade.css">
<style>
#sidebarad1,
#sidebarad2 {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  width: 160px;
  height: 600px;
  padding: 0;
  margin: 0;
  z-index: 999999;
}
#sidebarad1 {
  left: 0;
}
#sidebarad2 {
  right: 0;
}
.sidebar-close {
  position: absolute;
  top: 0;
  right: 0;
  width: 22px;
  height: 22px;
  line-height: 22px;
  text-align: center;
  background: rgba(0,0,0,0.7);
  color: #fff;
  font-size: 14px;
  cursor: pointer;
  user-select: none;
  z-index: 10;
}
.sidebar-frame {
  width: 160px;
  height: 600px;
  border: none;
  display: block;
}
</style>
</head>

<body>
  <div id="canvas_border">
    <div id="play_content" class="middle center">
      <div class="box">
        <img src="https://cdn.jsdelivr.net/gh/genizy/google-class/monster-tracks/webapp/cover.jpg" class="cover">
        <p class="title">Monster Tracks</p>
        <p class="author">TGC</p>
      </div>
      <progress id="progress" class="loading" value="0" max="100"></progress>
    </div>
    <canvas class="emscripten" id="canvas" tabindex="-1"></canvas>
  </div>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/gh/genizy/google-class/monster-tracks/webapp/source_min.js" crossorigin="anonymous"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/gh/genizy/google-class/monster-tracks/webapp/index.js" crossorigin="anonymous"></script>
</html>
